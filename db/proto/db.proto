syntax = "proto3";

package db;

// Database service for distributed storage with Raft consensus.
//
// Domain RPCs (CreateTicket/GetTicket/... and the user equivalents) are the
// primary, ARCHITECTURE.md-aligned API. They use the hybrid storage model:
// an opaque, custodian-encrypted `encrypted_body` plus plaintext index fields
// the DB uses to maintain secondary indexes and answer QueryTickets filters.
//
// The generic KV RPCs (Put/Get/Delete/List/Exists/BatchPut) are retained for
// collections without a domain schema (sessions, audit) used by auth/admin.
// Retiring them fully is tracked as a follow-up.
service Database {
  // ---- Domain RPCs: tickets ----
  rpc CreateTicket(TicketWrite) returns (TicketRecord);
  rpc GetTicket(TicketLookup) returns (TicketRecord);
  rpc UpdateTicket(TicketWrite) returns (TicketRecord);
  rpc SoftDeleteTicket(TicketLookup) returns (DeleteAck);
  rpc QueryTickets(TicketQuery) returns (stream TicketRecord);

  // ---- Domain RPCs: users ----
  rpc CreateUser(UserWrite) returns (UserRecord);
  rpc GetUser(UserLookup) returns (UserRecord);
  rpc UpdateUser(UserWrite) returns (UserRecord);
  rpc SoftDeleteUser(UserLookup) returns (DeleteAck);

  // ---- Generic KV (sessions/audit; auth & admin) ----
  // Store a key-value pair (goes through Raft leader)
  rpc Put(PutRequest) returns (PutResponse);

  // Retrieve a value by key (can read from any node)
  rpc Get(GetRequest) returns (GetResponse);

  // Delete a key (goes through Raft leader)
  rpc Delete(DeleteRequest) returns (DeleteResponse);

  // List keys with optional prefix filter
  rpc List(ListRequest) returns (ListResponse);

  // Check if key exists
  rpc Exists(ExistsRequest) returns (ExistsResponse);

  // Batch operations
  rpc BatchPut(BatchPutRequest) returns (BatchPutResponse);

  // Health check
  rpc Health(HealthRequest) returns (HealthResponse);

  // Get cluster status (leader, followers, etc.)
  rpc ClusterStatus(ClusterStatusRequest) returns (ClusterStatusResponse);
}

// ============================================================================
// Domain messages (hybrid model: encrypted body + plaintext index fields)
// ============================================================================

// Plaintext, indexable fields extracted from a ticket by the custodian.
message TicketIndexFields {
  uint32 status = 1;                    // domain TicketStatus repr(u8)
  string account_uuid = 2;
  optional string assigned_to_uuid = 3;
  string project = 4;
  optional string tracking_url = 5;
  int64 created_at_unix = 6;
  int64 updated_at_unix = 7;
}

// Create (ticket_id = 0) or update (ticket_id > 0) a ticket.
message TicketWrite {
  uint64 ticket_id = 1;
  bytes encrypted_body = 2;
  TicketIndexFields index = 3;
}

message TicketRecord {
  uint64 ticket_id = 1;
  bytes encrypted_body = 2;
  bool deleted = 3;
  int64 deleted_at_unix = 4;
}

message TicketLookup {
  uint64 ticket_id = 1;
  bool include_deleted = 2;
}

// Filter for QueryTickets. Set fields are ANDed; unset means "any".
message TicketQuery {
  optional uint32 status = 1;
  optional string assigned_to_uuid = 2;
  optional string account_uuid = 3;
  optional string project = 4;
  bool include_deleted = 5;
  uint32 limit = 6;                     // 0 = unlimited
}

message DeleteAck {
  bool success = 1;
}

// Plaintext, indexable fields extracted from a user.
message UserIndexFields {
  string username = 1;
  string email = 2;
  uint32 role = 3;                      // domain Role repr(u8)
}

message UserWrite {
  string user_uuid = 1;
  bytes encrypted_body = 2;
  UserIndexFields index = 3;
}

message UserRecord {
  string user_uuid = 1;
  bytes encrypted_body = 2;
  bool deleted = 3;
  int64 deleted_at_unix = 4;
}

message UserLookup {
  string user_uuid = 1;
  bool include_deleted = 2;
}

// Raft consensus service for inter-node communication
service RaftService {
  // Append entries RPC (send log entries to followers)
  rpc AppendEntries(AppendEntriesRequest) returns (AppendEntriesResponse);
  
  // Vote RPC (request votes during leader election)
  rpc Vote(VoteRequest) returns (VoteResponse);
  
  // Install snapshot RPC (send snapshot data to followers)
  rpc InstallSnapshot(InstallSnapshotRequest) returns (InstallSnapshotResponse);
}

message PutRequest {
  string collection = 1;
  bytes key = 2;
  bytes value = 3;
}

message PutResponse {
  bool success = 1;
  string error = 2;
}

message GetRequest {
  string collection = 1;
  bytes key = 2;
}

message GetResponse {
  bool found = 1;
  bytes value = 2;
  string error = 3;
}

message DeleteRequest {
  string collection = 1;
  bytes key = 2;
}

message DeleteResponse {
  bool success = 1;
  string error = 2;
}

message ListRequest {
  string collection = 1;
  bytes prefix = 2;
  uint32 limit = 3;
}

message ListResponse {
  repeated KeyValue items = 1;
}

message ExistsRequest {
  string collection = 1;
  bytes key = 2;
}

message ExistsResponse {
  bool exists = 1;
}

message BatchPutRequest {
  string collection = 1;
  repeated KeyValue items = 2;
}

message KeyValue {
  bytes key = 1;
  bytes value = 2;
}

message BatchPutResponse {
  bool success = 1;
  uint32 written = 2;
  string error = 3;
}

message HealthRequest {}

message HealthResponse {
  bool healthy = 1;
  string node_id = 2;
  string role = 3;  // "leader", "follower", "candidate"
}

message ClusterStatusRequest {}

message ClusterStatusResponse {
  string leader_id = 1;
  repeated string member_ids = 2;
  uint64 term = 3;
  uint64 commit_index = 4;
}

// ============================================================================
// Raft consensus RPC messages - aligned with openraft 0.9 API
// ============================================================================

// Core types used in Raft RPCs

message ProtoVote {
  uint64 term = 1;
  uint64 node_id = 2;
  bool committed = 3;
}

message ProtoLogId {
  uint64 term = 1;
  uint64 index = 2;
}

// Append entries request - replica synchronization
message AppendEntriesRequest {
  ProtoVote vote = 1;                    // Leader's vote (term + node_id)
  ProtoLogId prev_log_id = 2;            // (term, index) of log entry preceding new ones
  repeated Entry entries = 3;            // Entries to replicate
  ProtoLogId leader_commit = 4;          // Leader's commit index
}

message Entry {
  bytes data = 1;  // Serialized log entry
}

// Append entries response - replication result
message AppendEntriesResponse {
  ProtoVote vote = 1;                    // Responder's current vote
  uint32 response_type = 2;              // 0=Success, 1=PartialSuccess, 2=Conflict, 3=HigherVote
  ProtoLogId partial_success_index = 3;  // For PartialSuccess: index of first accepted entry
}

// Vote request - leader election
message VoteRequest {
  ProtoVote vote = 1;            // Candidate's vote
  ProtoLogId last_log_id = 2;    // (term, index) of candidate's last log entry
}

// Vote response - leader election result
message VoteResponse {
  ProtoVote vote = 1;            // Voter's current vote after handling request
  bool vote_granted = 2;         // Whether vote was granted
  ProtoLogId last_log_id = 3;    // Voter's last log id (for debugging)
}

// Install snapshot request - log recovery
message InstallSnapshotRequest {
  ProtoVote vote = 1;
  SnapshotMeta meta = 2;
  uint64 offset = 3;        // Byte offset in snapshot data
  bytes data = 4;           // Snapshot chunk data
  bool done = 5;            // True if this is the last chunk
}

message SnapshotMeta {
  ProtoLogId last_log_id = 1;    // Last log id in snapshot
  uint64 last_applied = 2;       // State machine index after applying this snapshot
  uint32 last_membership = 3;    // Last membership config version
  string snapshot_id = 4;        // Unique snapshot identifier
}

// Install snapshot response
message InstallSnapshotResponse {
  ProtoVote vote = 1;
}
