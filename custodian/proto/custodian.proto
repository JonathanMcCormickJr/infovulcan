syntax = "proto3";

package custodian;

import "google/protobuf/timestamp.proto";

// Custodian service for ticket lifecycle management with distributed locking
service CustodianService {
  // Create a new ticket
  rpc CreateTicket(CreateTicketRequest) returns (Ticket);

  // Acquire an exclusive lock on a ticket
  rpc AcquireLock(LockRequest) returns (LockResponse);

  // Release a lock on a ticket
  rpc ReleaseLock(LockRelease) returns (LockResponse);

  // Update an existing ticket
  rpc UpdateTicket(UpdateTicketRequest) returns (Ticket);

  // Get a ticket by ID
  rpc GetTicket(GetTicketRequest) returns (Ticket);

  // Query/search tickets with optional filters (streaming)
  rpc QueryTickets(QueryTicketsRequest) returns (stream Ticket);

  // Health check
  rpc Health(HealthRequest) returns (HealthResponse);

  // Get cluster status (leader, followers, etc.)
  rpc ClusterStatus(ClusterStatusRequest) returns (ClusterStatusResponse);
}

// Raft consensus service for inter-node communication
service RaftService {
  // Append entries RPC (send log entries to followers)
  rpc AppendEntries(AppendEntriesRequest) returns (AppendEntriesResponse);

  // Vote RPC (request votes during leader election)
  rpc Vote(VoteRequest) returns (VoteResponse);

  // Install snapshot RPC (send snapshot data to followers)
  rpc InstallSnapshot(InstallSnapshotRequest) returns (InstallSnapshotResponse);
}

// Ticket creation request
message CreateTicketRequest {
  string title = 1;
  string project = 2;
  string account_uuid = 3;
  Symptom symptom = 4;
  TicketPriority priority = 5;
  string created_by_uuid = 6;
  optional string customer_ticket_number = 7;
  optional string isp_ticket_number = 8;
  optional string other_ticket_number = 9;
  optional string ebond = 10;
  optional string tracking_url = 11;
  repeated NetworkDevice network_devices = 12;
}

message GetTicketRequest {
  uint64 ticket_id = 1;
}

// Filter for QueryTickets. Set fields are combined with AND; unset means "any".
message QueryTicketsRequest {
  optional uint32 status = 1;
  optional string assigned_to_uuid = 2;
  optional string account_uuid = 3;
  optional string project = 4;
  bool include_deleted = 5;
  uint32 limit = 6;             // 0 = unlimited
}

// Lock acquisition request
message LockRequest {
  uint64 ticket_id = 1;
  string user_uuid = 2;
}

// Lock release request
message LockRelease {
  uint64 ticket_id = 1;
  string user_uuid = 2;
}

// Lock operation response
message LockResponse {
  bool success = 1;
  string error = 2;
  optional string current_holder = 3;
}

// Ticket update request
message UpdateTicketRequest {
  uint64 ticket_id = 1;
  optional string title = 2;
  optional string project = 3;
  optional Symptom symptom = 4;
  optional TicketPriority priority = 5;
  optional TicketStatus status = 6;
  NextAction next_action = 7;
  optional Resolution resolution = 8;
  optional string assigned_to_uuid = 9;
  optional string updated_by_uuid = 10;
  optional string ebond = 11;
  optional string tracking_url = 12;
  repeated NetworkDevice network_devices = 13;
}

// Ticket data structure
message Ticket {
  uint64 ticket_id = 1;
  optional string customer_ticket_number = 2;
  optional string isp_ticket_number = 3;
  optional string other_ticket_number = 4;
  string title = 5;
  string project = 6;
  string account_uuid = 7;
  Symptom symptom = 8;
  TicketPriority priority = 9;
  TicketStatus status = 10;
  NextAction next_action = 11;
  optional Resolution resolution = 12;
  optional string locked_by_uuid = 13;
  optional string assigned_to_uuid = 14;
  string created_by_uuid = 15;
  google.protobuf.Timestamp created_at = 16;
  string updated_by_uuid = 17;
  google.protobuf.Timestamp updated_at = 18;
  repeated HistoryEntry history = 19;
  optional string ebond = 20;
  optional string tracking_url = 21;
  repeated NetworkDevice network_devices = 22;
  uint32 schema_version = 23;
}

// History entry for audit trail
message HistoryEntry {
  string user_uuid = 1;
  google.protobuf.Timestamp timestamp = 2;
  string action = 3;
  string details = 4;
}

// Symptom categories
enum Symptom {
  SYMPTOM_UNKNOWN = 0;
  BROADBAND_DOWN = 1;
  BROADBAND_INTERMITTENT = 2;
  PACKET_LOSS = 3;
  POWER = 4;
  VPN_ISSUE = 5;
  CONFIGURATION_ERROR = 6;
  HARDWARE_FAILURE = 7;
  SOFTWARE_BUG = 8;
  SECURITY_INCIDENT = 9;
  SLOW_BANDWIDTH = 10;
  DUPLEXING_MISMATCH = 11;
  LATENCY_ISSUES = 12;
  JITTER_PROBLEMS = 13;
  DNS_ISSUES = 14;
  SYMPTOM_OTHER = 255;
}

// Ticket priority
enum TicketPriority {
  PRIORITY_UNKNOWN = 0;
  HARD_DOWN = 1;
  PRIMARY_DOWN = 2;
  BACKUP_DOWN = 3;
  INTERMITTENT = 4;
  PRIORITY_PACKET_LOSS = 5;
}

// Ticket status
enum TicketStatus {
  TICKET_STATUS_UNSPECIFIED = 0;
  OPEN = 1;
  AWAITING_CUSTOMER = 2;
  AWAITING_ISP = 3;
  AWAITING_PARTNER = 4;
  SUPPORT_HOLD = 5;
  HANDED_OFF = 6;
  APPOINTMENT_SCHEDULED = 7;
  EBOND_RECEIVED = 8;
  VOICEMAIL_RECEIVED = 9;
  AUTO_CLOSE = 254;
  CLOSED = 255;
}

// Auto-close schedule for the AutoClose next-action.
enum AutoCloseSchedule {
  AUTO_CLOSE_SCHEDULE_UNSPECIFIED = 0;
  END_OF_DAY = 1;
  HOURS_24 = 2;
  HOURS_48 = 3;
  HOURS_72 = 4;
}

// Next action. Mirrors the domain `NextAction` losslessly: an absent message (or an
// unset `kind`) means "None"; otherwise the scheduling data is carried explicitly.
message NextAction {
  oneof kind {
    google.protobuf.Timestamp follow_up = 1;
    google.protobuf.Timestamp appointment = 2;
    AutoCloseSchedule auto_close = 3;
  }
}

// Resolution
enum Resolution {
  RESOLUTION_UNSPECIFIED = 0;
  FIXED = 1;
  UNABLE_TO_REPRODUCE = 2;
  CUSTOMER_EDUCATION = 3;
  EQUIPMENT_REPLACEMENT = 4;
  SERVICE_UPGRADE_RESOLVED = 5;
  CANCELLED = 6;
  ESCALATED = 7;
}

// Network device types
message NetworkDevice {
  oneof device_type {
    DslModem dsl_modem = 1;
    CoaxModem coax_modem = 2;
    Ont ont = 3;
    FixedWirelessAntenna fixed_wireless_antenna = 4;
    VpnGw vpn_gw = 5;
    Switch switch = 6;
    Router router = 7;
    Firewall firewall = 8;
  }
}

message DslModem {
  string make = 1;
  string model = 2;
  optional string mac_address = 3;
  optional string serial_number = 4;
}

message CoaxModem {
  string make = 1;
  string model = 2;
  optional string mac_address = 3;
  optional string serial_number = 4;
}

message Ont {
  string make = 1;
  string model = 2;
  optional string mac_address = 3;
  optional string serial_number = 4;
}

message FixedWirelessAntenna {
  string make = 1;
  string model = 2;
  optional string mac_address = 3;
  optional string serial_number = 4;
}

message VpnGw {
  string make = 1;
  string model = 2;
  optional string mac_address = 3;
  optional string serial_number = 4;
}

message Switch {
  string make = 1;
  string model = 2;
  optional string mac_address = 3;
  optional string serial_number = 4;
}

message Router {
  string make = 1;
  string model = 2;
  optional string mac_address = 3;
  optional string serial_number = 4;
}

message Firewall {
  string make = 1;
  string model = 2;
  optional string mac_address = 3;
  optional string serial_number = 4;
}

// Health check messages
message HealthRequest {}

message HealthResponse {
  bool healthy = 1;
  string status = 2;
}

// Cluster status messages
message ClusterStatusRequest {}

message ClusterStatusResponse {
  string leader_id = 1;
  repeated string follower_ids = 2;
  uint64 term = 3;
  uint64 commit_index = 4;
}

// ============================================================================
// Raft consensus RPC messages — aligned with the openraft 0.9 API (mirrors db.proto).
// Log entries are carried as opaque serialized bytes so no consensus-relevant field is
// ever lost on the wire (the previous simplified messages were lossy and broke multi-node).
// ============================================================================

message ProtoVote {
  uint64 term = 1;
  uint64 node_id = 2;
  bool committed = 3;
}

message ProtoLogId {
  uint64 term = 1;
  uint64 index = 2;
}

message Entry {
  bytes data = 1;  // serialized openraft log entry (contains the LockCommand payload)
}

message AppendEntriesRequest {
  ProtoVote vote = 1;
  ProtoLogId prev_log_id = 2;
  repeated Entry entries = 3;
  ProtoLogId leader_commit = 4;
}

message AppendEntriesResponse {
  ProtoVote vote = 1;
  uint32 response_type = 2;              // 0=Success, 1=PartialSuccess, 2=Conflict, 3=HigherVote
  ProtoLogId partial_success_index = 3;  // For PartialSuccess: index of first accepted entry
}

message VoteRequest {
  ProtoVote vote = 1;
  ProtoLogId last_log_id = 2;
}

message VoteResponse {
  ProtoVote vote = 1;
  bool vote_granted = 2;
  ProtoLogId last_log_id = 3;
}

message SnapshotMeta {
  ProtoLogId last_log_id = 1;
  uint64 last_applied = 2;
  uint32 last_membership = 3;
  string snapshot_id = 4;
}

message InstallSnapshotRequest {
  ProtoVote vote = 1;
  SnapshotMeta meta = 2;
  uint64 offset = 3;
  bytes data = 4;
  bool done = 5;
}

message InstallSnapshotResponse {
  ProtoVote vote = 1;
}